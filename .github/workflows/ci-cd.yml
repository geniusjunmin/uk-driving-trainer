name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint if configured
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script configured; skipping lint."
          fi

      - name: Run tests
        run: npm run test

      - name: Build production bundle
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: uk-driving-trainer-dist
          path: dist
          if-no-files-found: error

  # Optional deployment job examples:
  # - GitHub Pages can be added with actions/configure-pages, upload-pages-artifact,
  #   and deploy-pages after enabling Pages in repository settings.
  # - Vercel deployment can be added with the official Vercel CLI/action once
  #   project-specific secrets are created in the repository settings.
