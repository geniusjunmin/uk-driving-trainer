name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint if configured
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script configured; skipping lint."
          fi

      - name: Run tests
        run: npm run test

      - name: Build production bundle
        run: npm run build

      - name: Run browser smoke test
        run: npm run smoke:browser

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: uk-driving-trainer-dist
          path: dist
          if-no-files-found: error

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  docker-image:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t uk-driving-trainer -f deploy/Dockerfile .

      - name: Run container health check
        shell: bash
        run: |
          docker run -d --rm -p 8080:80 --name uk-driving-trainer-smoke uk-driving-trainer
          trap 'docker stop uk-driving-trainer-smoke' EXIT

          for attempt in {1..20}; do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null; then
              echo "Container responded on attempt ${attempt}."
              exit 0
            fi
            sleep 1
          done

          docker logs uk-driving-trainer-smoke
          exit 1

  deploy-pages:
    name: Deploy GitHub Pages
    needs:
      - build-and-test
      - docker-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
